<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Çınar - Kalarium Medya</title>
  <meta name="description" content="Çınar’ın Kalarium Medya profili. Oyundaki adı, rütbesi ve sosyal medya hesapları burada.">
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .profile {
      background: rgba(30,30,30,0.95);
      padding: 2rem 3rem;
      border-radius: 1rem;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .profile img {
      border-radius: 10px;
      margin-bottom: 1rem;
      max-width: 100%;
      height: auto;
    }
    .profile h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #6ee7b7;
    }
    .profile p {
      margin-bottom: 1rem;
      color: #ccc;
    }
    .social-links a {
      display: inline-block;
      margin: 0.5rem;
      padding: 0.5rem 1rem;
      color: #fff;
      background: #3b82f6;
      border-radius: 0.5rem;
      text-decoration: none;
      transition: 0.2s;
    }
    .social-links a:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div class="profile">
    <!-- 3D Skin Fotoğrafı -->
    <img src="/cinar.png" alt="Çınar Avatar">

    <!-- Kullanıcı Bilgileri -->
    <h1>Çınar</h1>
    <p>Oyundaki Adı: <strong>cinar</strong></p>
    <p>Rütbesi: <strong>Medya+</strong></p>

    <!-- Sosyal Medya Linkleri -->
    <div class="social-links">
      <a href="https://www.youtube.com/@cinarpro53" target="_blank">YouTube</a>
      <a href="https://tiktok.com/" target="_blank">Tiktok</a>
      <a href="https://instagram.com/" target="_blank">Instagram</a>
    </div>
  </div>
</body>
</html>
